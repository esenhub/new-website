
<html>
 <head>
 <style>
 html, body {
 margin: 0;
 padding: 0;
 }

 body {
 display: flex;
 justify-content: center;
 align-items: center;
 }

 :root {
 -webkit-font-smoothing: antialiased;
 -moz-osx-font-smoothing: grayscale;
 }

 * {
 box-sizing: border-box;
 -webkit-font-smoothing: inherit;
 }

 h1, h2, h3, h4, h5, h6, p, figure {
 margin: 0;
 }

 body, input, textarea, select, button {
 font-size: 12px;
 font-family: sans-serif;
 }
 </style>
 </head>
 <body>
 <!-- iClosed inline widget begin -->
 <div class="iclosed-widget" data-url="https://app.iclosed.io/e/educate/demo-call" title="Demo Call | Monetise" style="width: 100%; height: 620px"></div>
 <script type="text/javascript" src="https://app.iclosed.io/assets/widget.js" async></script>
 <!-- iClosed inline widget end -->
 
 <script type="module">
 let height = 0

 function sendEmbedHeight() {
 window.parent.postMessage({
 embedHeight: height
 }, "*")
 }

 const observer = new ResizeObserver((entries) => {
 if (entries.length !== 1) return
 const entry = entries[0]
 if (entry.target !== document.body) return

 height = entry.contentRect.height
 sendEmbedHeight()
 })

 observer.observe(document.body)

 window.addEventListener("message", (event) => {
 if (event.source !== window.parent) return
 if (event.data !== "getEmbedHeight") return
 sendEmbedHeight()
 })
 </script>
 <body>
